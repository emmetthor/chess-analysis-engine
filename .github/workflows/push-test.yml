name: Push Test

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: |
          cmake -B ${{github.workspace}}/build -S .

    - name: Build
      run: cmake --build ${{github.workspace}}/build
    
  format:
    needs: build
    uses: ./.github/workflows/format-check.yml