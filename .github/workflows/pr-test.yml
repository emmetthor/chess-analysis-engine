name: PR Test

on:
  pull_request:
    branches:
      - main
    paths:
      - 'engine/src/search/**'
      - 'engine/include/search/**'
      - 'engine/src/evaluate/**'
      - 'engine/include/evaluate/**'
      - 'engine/src/move/**'
      - 'engine/include/move/**'
      - 'bench/openings_small.pgn'
      - '.github/workflows/pr-small-match.yml'
      - '.github/workflows/pr-test.yml'
      - '.github/workflows/sanitizers.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure Debug Build
        run: |
          cmake -B ${{ github.workspace }}/build-debug -S . \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-DENGINE_DEBUG"

      - name: Build Debug
        run: |
          cmake --build ${{ github.workspace }}/build-debug --config Debug

      - name: Board Consistency Test
        working-directory: ${{ github.workspace }}/build-debug
        run: ctest -R BoardConsistencyTest --verbose

      - name: M1 Test
        working-directory: ${{ github.workspace }}/build-debug
        run: ctest -R M1Test --verbose

      - name: M2 Test
        working-directory: ${{ github.workspace }}/build-debug
        run: ctest -R M2Test --verbose

      - name: BitMove Test
        working-directory: ${{ github.workspace }}/build-debug
        run: ctest -R BitMoveTest --verbose
  perft:
    needs: test
    uses: ./.github/workflows/perft.yml

  regression:
    needs: perft
    uses: ./.github/workflows/regression.yml

  sanitizers:
    needs: perft
    uses: ./.github/workflows/sanitizers.yml