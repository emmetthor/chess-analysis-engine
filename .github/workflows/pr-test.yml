name: PR Test

on:
  pull_request:
    branches:
      - main
    paths:
      - 'engine/src/search/**'
      - 'engine/include/search/**'
      - 'engine/src/evaluate/**'
      - 'engine/include/evaluate/**'
      - 'engine/src/move/**'
      - 'engine/include/move/**'
      - 'bench/openings_small.pgn'
      - '.github/workflows/pr-small-match.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Configure CMake
        run: |
          cmake -B ${{github.workspace}}/build -S . \
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -DENGINE_DEBUG"

      - name: Build
        run:
          cmake --build ${{github.workspace}}/build

      - name: Board Consistency Test
        working-directory: ${{github.workspace}}/build
        run: ctest -R BoardConsistencyTest --verbose

      - name: M1 Test
        working-directory: ${{github.workspace}}/build
        run: ctest -R M1Test --verbose

      - name: M2 Test
        working-directory: ${{github.workspace}}/build
        run: ctest -R M2Test --verbose
      
      - name: BitMove Test
        working-directory: ${{github.workspace}}/build
        run: ctest -R BitMoveTest --verbose

      - name: Perft regression
        run: |
          python tests/perft/Perft_Test.py \
            --engine build/Hynobius.exe \
            --file tests/perft/Perft_Tests.txt\
            --max-depth 5
        

  sanitizers:
    needs: test   # 先通過 test 才跑 sanitizer
    uses: ./.github/workflows/sanitizers.yml

  small-test:
    needs: sanitizers
    uses: ./.github/workflows/pr-small-match.yml
