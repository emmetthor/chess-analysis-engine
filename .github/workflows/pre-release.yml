name: Auto Pre-release

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  auto-prerelease:
    name: Auto pre-release from commit message
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect pre-release request
        id: detect
        shell: pwsh
        run: |
          $commitMessage = git log -1 --pretty=%B

          Write-Host "========== Commit message start =========="
          Write-Host $commitMessage
          Write-Host "========== Commit message end =========="

          $match = [regex]::Match(
            $commitMessage,
            '(?im)^\s*Pre[- ]Release\s*[:：]\s*(v\d+\.\d+\.\d+-(alpha|beta|rc)\.\d+)\s*$'
          )

          if (-not $match.Success) {
            Write-Host "No Pre-Release field found. Skipping."
            "SHOULD_RELEASE=false" >> $env:GITHUB_ENV
            exit 0
          }

          $tagName = $match.Groups[1].Value
          $shortSha = git rev-parse --short=8 HEAD
          $fullSha = git rev-parse HEAD

          Write-Host "Detected pre-release tag: $tagName"

          "SHOULD_RELEASE=true" >> $env:GITHUB_ENV
          "TAG_NAME=$tagName" >> $env:GITHUB_ENV
          "SHORT_SHA=$shortSha" >> $env:GITHUB_ENV
          "FULL_SHA=$fullSha" >> $env:GITHUB_ENV

      - name: Stop if no pre-release requested
        if: env.SHOULD_RELEASE != 'true'
        shell: pwsh
        run: |
          Write-Host "No pre-release requested."

      - name: Check tag does not already exist
        if: env.SHOULD_RELEASE == 'true'
        shell: pwsh
        run: |
          git fetch --tags

          $exists = git tag --list "$env:TAG_NAME"

          if ($exists) {
            Write-Error "Tag $env:TAG_NAME already exists. Use a new pre-release version."
            exit 1
          }

      - name: Create annotated tag
        if: env.SHOULD_RELEASE == 'true'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$env:TAG_NAME" -F release-notes.md
          git push origin "refs/tags/$env:TAG_NAME"

      - name: Configure CMake
        if: env.SHOULD_RELEASE == 'true'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        if: env.SHOULD_RELEASE == 'true'
        run: cmake --build build --config Release

      - name: Prepare artifact
        if: env.SHOULD_RELEASE == 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist

          $exe = Get-ChildItem -Path build -Recurse -Filter "Hynobius.exe" | Select-Object -First 1

          if ($null -eq $exe) {
            Write-Error "Hynobius.exe not found."
            exit 1
          }

          Copy-Item $exe.FullName "dist/Hynobius-$env:TAG_NAME-windows.exe"

      - name: Create GitHub pre-release
        if: env.SHOULD_RELEASE == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$env:TAG_NAME" `
            "dist/Hynobius-$env:TAG_NAME-windows.exe" `
            --title "Hynobius $env:TAG_NAME dev-$env:SHORT_SHA" `
            --notes-file release-notes.md `
            --prerelease