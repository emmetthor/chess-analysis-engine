name: Pre-release

on:
  push:
    tags:
      - "v*.*.*-alpha.*"
      - "v*.*.*-beta.*"
      - "v*.*.*-rc.*"

permissions:
  contents: write

jobs:
  full-tests:
    uses: ./.github/workflows/pr-test.yml

  build-windows:
    needs: full-tests
    name: Build Windows engine
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        shell: pwsh
        run: |
          if (Test-Path ".\tests") {
            ctest --test-dir build --output-on-failure -C Release
          } else {
            Write-Host "No tests directory found, skipping ctest."
          }

      - name: Prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist

          $exe = Get-ChildItem -Path build -Recurse -Filter "Hynobius.exe" | Select-Object -First 1

          if ($null -eq $exe) {
            Write-Error "Hynobius.exe not found."
            exit 1
          }

          Copy-Item $exe.FullName "dist/Hynobius-${{ github.ref_name }}-windows.exe"

      - name: Collect info
        shell: pwsh
        run: |
          $tagName = "${{ github.ref_name }}"
          $shortSha = git rev-parse --short HEAD
          $fullSha = git rev-parse HEAD
          $commitSubject = git log -1 --pretty=%s
          $commitBody = git log -1 --pretty=%b

          $tagObjectType = git cat-file -t "refs/tags/$tagName"

          if ($tagObjectType -eq "tag") {
            $tagMessage = git for-each-ref "refs/tags/$tagName" --format="%(contents)"
          } else {
            $tagMessage = "No annotated tag message found. This is probably a lightweight tag."
          }

          "SHORT_SHA=$shortSha" >> $env:GITHUB_ENV

          @"
          ```text
          $tagMessage

          Tag: $tagName   
          Commit: $fullSha

          $commitSubject

          $commitBody
          ```
          "@ | Set-Content -Path release-notes.md -Encoding utf8

      - name: Create GitHub pre-release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "dist/Hynobius-${{ github.ref_name }}-windows.exe" `
            --title "Hynobius ${{ github.ref_name }} dev-$env:SHORT_SHA" `
            --notes-file release-notes.md `
            --prerelease