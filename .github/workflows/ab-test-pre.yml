name: AB Test

on:
  workflow_dispatch:
    inputs:
      baseline_ref:
        description: "Baseline git ref (tag / branch / commit)"
        required: false
        default: "v0.1-baseline"
        type: string
      candidate_ref:
        description: "Candidate git ref (tag / branch / commit)"
        required: false
        default: ""
        type: string
      games:
        description: "Total games"
        required: false
        default: "4"
        type: string
      rounds:
        description: "Opening rounds (paired openings)"
        required: false
        default: "2"
        type: string
      tc:
        description: "Time control, e.g. 60+0.1"
        required: false
        default: "60+0.1"
        type: string
      depth:
        description: "Search depth"
        required: false
        default: "5"
        type: string

  workflow_call:
    inputs:
      baseline_ref:
        required: false
        default: "v0.1-baseline"
        type: string
      candidate_ref:
        required: false
        default: ""
        type: string
      games:
        required: false
        default: "4"
        type: string
      rounds:
        required: false
        default: "2"
        type: string
      tc:
        required: false
        default: "60+0.1"
        type: string
      depth:
        required: false
        default: "5"
        type: string
      opening_file:
        required: false
        default: "D:\\Cute_Chess\\pgn\\openings.pgn"
        type: string

permissions:
  contents: read

jobs:
  small-match:
    runs-on: [self-hosted, windows, X64, engine]

    steps:
      - name: Checkout candidate
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.candidate_ref != '' && inputs.candidate_ref || github.sha }}
          path: candidate

      - name: Checkout baseline
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.baseline_ref }}
          path: baseline

      - name: Build candidate
        shell: pwsh
        run: |
          cmake -S candidate/ -B candidate/build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
          cmake --build candidate/build --config Release

      - name: Build baseline
        shell: pwsh
        run: |
          cmake -S baseline/engine -B baseline/build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
          cmake --build baseline/build --config Release

      - name: Prepare output folders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          New-Item -ItemType Directory -Force -Path out/pgn | Out-Null
          New-Item -ItemType Directory -Force -Path out/results | Out-Null

      - name: Resolve executable paths
        shell: pwsh
        run: |
          $baseline1 = "baseline/build/Release/chess-analysis-engine.exe"
          $baseline2 = "baseline/build/chess-analysis-engine.exe"
          $candidate1 = "candidate/build/Release/chess-analysis-engine.exe"
          $candidate2 = "candidate/build/chess-analysis-engine.exe"

          if (Test-Path $baseline1) { $baselineExe = (Resolve-Path $baseline1).Path }
          elseif (Test-Path $baseline2) { $baselineExe = (Resolve-Path $baseline2).Path }
          else { throw "Baseline exe not found" }

          if (Test-Path $candidate1) { $candidateExe = (Resolve-Path $candidate1).Path }
          elseif (Test-Path $candidate2) { $candidateExe = (Resolve-Path $candidate2).Path }
          else { throw "Candidate exe not found" }

          "BASELINE_EXE=$baselineExe" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CANDIDATE_EXE=$candidateExe" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Run small paired-opening match
        shell: pwsh
        run: |
          $timestamp = Get-Date -Format "yyyy-MM-dd_HH-mm-ss"
          $pgn = "out/pgn/pr_small_match_$timestamp.pgn"
          $txt = "out/results/pr_small_match_$timestamp.txt"

          $games = "${{ inputs.games }}"
          $rounds = "${{ inputs.rounds }}"
          $tc = "${{ inputs.tc }}"
          $depth = "${{ inputs.depth }}"
          $openingFile = "D:\Cute_Chess\pgn\openings.pgn"

          D:\Cute_Chess\cutechess-cli.exe `
            -engine name=baseline cmd="$env:BASELINE_EXE" `
            -engine name=candidate cmd="$env:CANDIDATE_EXE" `
            -each proto=uci tc=$tc depth=$depth `
            -openings file="$openingFile" format=pgn order=random `
            -rounds $rounds `
            -games $games `
            -repeat `
            -pgnout $pgn `
            | Tee-Object -FilePath $txt

          "PGN_FILE=$pgn" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RESULT_FILE=$txt" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Write summary
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_STEP_SUMMARY "## PR Small Match"
          Add-Content $env:GITHUB_STEP_SUMMARY ""
          Add-Content $env:GITHUB_STEP_SUMMARY "- Baseline ref: ${{ inputs.baseline_ref }}"
          Add-Content $env:GITHUB_STEP_SUMMARY "- Candidate ref: ${{ inputs.candidate_ref != '' && inputs.candidate_ref || github.sha }}"
          Add-Content $env:GITHUB_STEP_SUMMARY "- Depth: ${{ inputs.depth }}"
          Add-Content $env:GITHUB_STEP_SUMMARY "- Time control: ${{ inputs.tc }}"
          Add-Content $env:GITHUB_STEP_SUMMARY "- Opening pairs: ${{ inputs.rounds }}"
          Add-Content $env:GITHUB_STEP_SUMMARY "- Total games: ${{ inputs.games }}"
          Add-Content $env:GITHUB_STEP_SUMMARY ""
          Add-Content $env:GITHUB_STEP_SUMMARY '```'
          Get-Content $env:RESULT_FILE | Select-Object -Last 40 | Add-Content $env:GITHUB_STEP_SUMMARY
          Add-Content $env:GITHUB_STEP_SUMMARY '```'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ab-test-pre-${{ github.run_number }}
          path: |
            ${{ env.PGN_FILE }}
            ${{ env.RESULT_FILE }}