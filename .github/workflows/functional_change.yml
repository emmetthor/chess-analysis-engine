name: Functional Change Tests

on:
  push:
    branches:
      - main
      - dev

jobs:
  check:
    name: Detect functional change request
    runs-on: ubuntu-latest

    outputs:
      should_test: ${{ steps.detect.outputs.should_test }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect functional change request
        id: detect
        shell: pwsh
        run: |
          $commitMessage = git log -1 --pretty=%B

          Write-Host "========== Commit message start =========="
          Write-Host $commitMessage
          Write-Host "========== Commit message end =========="

          $match = [regex]::Match(
            $commitMessage,
            '(?i)\bfunctional\s+changes?\b'
          )

          if (-not $match.Success) {
            Write-Host "No Functional Change field found. Skipping tests."
            "should_test=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          Write-Host "Functional Change field found. Running tests."
          "should_test=true" >> $env:GITHUB_OUTPUT

  test:
    name: Run tests
    needs: check
    if: needs.check.outputs.should_test == 'true'
    uses: ./.github/workflows/run-tests.yml